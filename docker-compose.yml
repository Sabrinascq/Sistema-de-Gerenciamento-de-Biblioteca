version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: software
      POSTGRES_DB: biblioteca_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=software
      - DB_NAME=biblioteca_db
      - DB_PORT=5432

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend